name: Deploy a producción

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Corre en el runner self-hosted instalado en la VM voz-forense (172.16.50.220),
    # porque el servidor no es accesible por SSH desde los runners de GitHub.
    runs-on: self-hosted
    steps:
      - name: Actualizar código y reconstruir contenedor
        run: |
          cd /home/ubuntu/ForVoz
          git fetch origin
          git checkout main
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f
