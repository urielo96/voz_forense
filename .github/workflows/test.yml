name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de prueba
        run: pip install -r requirements-test.txt

      - name: Correr tests de extracción de parámetros
        env:
          DJANGO_SETTINGS_MODULE: configuration.settings
          SECRET_KEY: clave-solo-para-tests-no-importa
          DEBUG: "True"
        run: python test_services.py
